document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a26626ce-227f-4e21-b15e-9f65cd0ea09b\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0ab98fba-a92a-4324-bfb3-a89f9fa9ca2a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Spectral';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"52e21736-8261-47ce-b9a4-1fc9b2406f5b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n  --paper:#FAF8F2; --paper-2:#F3EFE6; --panel:#FFFFFF; --panel-2:#FBF8F1;\n  --ink:#1B1A17; --ink-2:#544F47; --ink-3:#8B8377;\n  --rule:#E6DFD0; --rule-strong:#D6CBB4;\n  --teal:#0F756B; --teal-soft:#E4F0EE;\n  --brass:#8C6E33; --brass-soft:#F2E9D6;\n  --display:'Spectral', Georgia, serif;\n  --mono:'IBM Plex Mono', ui-monospace, monospace; --sans:'IBM Plex Sans', system-ui, sans-serif;\n  --radius:6px; --sec-gap:84px;\n}\n*{box-sizing:border-box;}\nhtml,body{margin:0;}\nbody{\n  background-color:var(--paper);\n  background-image: radial-gradient(900px 420px at 10% -6%, rgba(15,117,107,0.05), transparent 60%), radial-gradient(760px 380px at 100% 0%, rgba(140,110,51,0.055), transparent 55%);\n  background-attachment:fixed;\n  color:var(--ink); font-family:var(--sans);\n  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;\n}\n::selection{background:var(--teal-soft);}\n@media print{ .no-print{display:none !important;} body{background:#fff !important;} .band{break-inside:avoid;} @page{margin:13mm;} }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ themeStyle }}\">\n\n  <div ref=\"{{ barRef }}\" class=\"no-print\" style=\"position:fixed; top:0; left:0; height:3px; width:0%; background:var(--teal); z-index:120; transition:width 0.08s linear;\"><\u002Fdiv>\n\n  <header class=\"no-print\" style=\"display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap; max-width:1080px; margin:0 auto; padding:18px 32px; border-bottom:1px solid var(--rule);\">\n    <div style=\"display:flex; align-items:center; gap:12px;\">\n      <div style=\"width:30px; height:30px; border-radius:7px; border:1px solid var(--brass); background:var(--brass-soft); display:grid; place-items:center; font-family:var(--mono); font-weight:600; font-size:12px; color:var(--brass);\">OA<\u002Fdiv>\n      <div style=\"font-family:var(--mono); font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-2);\">Deep Dive <span style=\"color:var(--ink-3);\">/ Purpose-Built Ops Apps<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:11px; flex-wrap:wrap;\">\n      <div ref=\"{{ segRef }}\" style=\"display:flex; gap:2px; padding:3px; border:1px solid var(--rule); border-radius:100px; background:var(--panel-2);\">\n        <button data-theme=\"editorial\" onclick=\"{{ setEditorial }}\" style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; padding:6px 11px; border-radius:100px; cursor:pointer; border:1px solid transparent; background:transparent; color:var(--ink-3); transition:all 0.15s ease;\">Editorial<\u002Fbutton>\n        <button data-theme=\"noir\" onclick=\"{{ setNoir }}\" style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; padding:6px 11px; border-radius:100px; cursor:pointer; border:1px solid transparent; background:transparent; color:var(--ink-3); transition:all 0.15s ease;\">Noir<\u002Fbutton>\n        <button data-theme=\"blueprint\" onclick=\"{{ setBlueprint }}\" style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; padding:6px 11px; border-radius:100px; cursor:pointer; border:1px solid transparent; background:transparent; color:var(--ink-3); transition:all 0.15s ease;\">Blueprint<\u002Fbutton>\n        <button data-theme=\"swiss\" onclick=\"{{ setSwiss }}\" style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; padding:6px 11px; border-radius:100px; cursor:pointer; border:1px solid transparent; background:transparent; color:var(--ink-3); transition:all 0.15s ease;\">Swiss<\u002Fbutton>\n      <\u002Fdiv>\n      <a href=\"index.html\" style=\"padding:6px 12px; border-radius:100px; border:1px solid var(--rule-strong); color:var(--ink-2); letter-spacing:0.06em; text-transform:uppercase; text-decoration:none;\" style-hover=\"border-color:var(--teal); color:var(--teal);\">↩ Brief<\u002Fa>\n      <button onclick=\"{{ print }}\" style=\"padding:7px 14px; border-radius:100px; border:1px solid var(--ink); background:var(--ink); color:var(--paper); font-family:var(--mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;\">Print<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1080px; margin:0 auto; padding:0 32px 96px;\">\n\n    <!-- HERO -->\n    <section style=\"padding:74px 0 0; max-width:880px;\">\n      <div style=\"font-family:var(--mono); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--teal); font-weight:600; margin-bottom:20px;\">Deep dive · Operational tooling<\u002Fdiv>\n      <h1 style=\"font-family:var(--display); font-weight:600; letter-spacing:-0.02em; color:var(--ink); font-size:clamp(40px,6vw,68px); line-height:1.04; margin:0 0 24px;\">Purpose-Built Ops Apps<\u002Fh1>\n      <p style=\"font-family:var(--display); font-style:italic; font-size:clamp(20px,2.6vw,28px); line-height:1.42; color:var(--ink-2); margin:0 0 22px; max-width:28ch;\">Risky, 30-step runbooks turned into one safe button the whole team can press.<\u002Fp>\n      <p style=\"font-size:18px; line-height:1.75; color:var(--ink-2); margin:0; max-width:64ch;\">The most error-prone work in operations is the manual checklist — done slightly differently by every technician, on a bad day, under time pressure. I built a suite of guided PowerShell Universal apps that encode each of those procedures once: <b style=\"color:var(--ink); font-weight:600;\">preview, confirm, execute, verify<\u002Fb> — with the guardrails, gating and audit trail built in.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-top:38px;\">\n        <div style=\"border:1px solid var(--rule); border-top:3px solid var(--teal); border-radius:var(--radius); background:var(--panel); padding:18px 20px;\">\n          <div style=\"font-family:var(--mono); font-size:28px; font-weight:600; color:var(--teal); line-height:1;\">90→&lt;5<\u002Fdiv>\n          <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); margin-top:8px;\">Min per termination<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--rule); border-top:3px solid var(--brass); border-radius:var(--radius); background:var(--panel); padding:18px 20px;\">\n          <div style=\"font-family:var(--mono); font-size:28px; font-weight:600; color:var(--ink); line-height:1;\">1,500+<\u002Fdiv>\n          <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); margin-top:8px;\">Terminations / year<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--rule); border-top:3px solid var(--brass); border-radius:var(--radius); background:var(--panel); padding:18px 20px;\">\n          <div style=\"font-family:var(--mono); font-size:28px; font-weight:600; color:var(--ink); line-height:1;\">30→1<\u002Fdiv>\n          <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); margin-top:8px;\">Steps to one click<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid var(--rule); border-top:3px solid var(--brass); border-radius:var(--radius); background:var(--panel); padding:18px 20px;\">\n          <div style=\"font-family:var(--mono); font-size:28px; font-weight:600; color:var(--ink); line-height:1;\">5 apps<\u002Fdiv>\n          <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3); margin-top:8px;\">Enterprise-adopted<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 01 THE IDEA -->\n    <section style=\"margin-top:var(--sec-gap); max-width:760px;\">\n      <div style=\"font-family:var(--mono); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--brass); font-weight:600; margin-bottom:14px;\">01 — The idea<\u002Fdiv>\n      <h2 style=\"font-family:var(--display); font-weight:600; letter-spacing:-0.015em; color:var(--ink); font-size:clamp(27px,3.5vw,37px); line-height:1.12; margin:0 0 20px;\">Encode the procedure once, run it safely forever.<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.75; color:var(--ink-2); margin:0; max-width:62ch;\">Each app replaces a manual runbook an analyst used to follow from memory. The workflow is standardized, the dangerous steps are gated, and every run is logged — so the newest team member executes a termination or decommission exactly as carefully as the most senior, every time. Some are run by my 8-person SysOps team; user creation, termination and analyst operations are used by <b style=\"color:var(--ink); font-weight:600;\">hundreds of people across every property<\u002Fb>.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- 02 THE SUITE -->\n    <section style=\"margin-top:var(--sec-gap);\">\n      <div style=\"font-family:var(--mono); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--brass); font-weight:600; margin-bottom:14px;\">02 — The suite<\u002Fdiv>\n      <h2 style=\"font-family:var(--display); font-weight:600; letter-spacing:-0.015em; color:var(--ink); font-size:clamp(27px,3.5vw,37px); line-height:1.12; margin:0 0 28px;\">Five apps that run the lifecycle.<\u002Fh2>\n\n      <div class=\"band\" style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:16px;\">\n\n        <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:24px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;\">\n            <h3 style=\"font-family:var(--display); font-weight:600; color:var(--ink); font-size:21px; margin:0;\">User Termination<\u002Fh3>\n            <span style=\"font-family:var(--mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--teal); border:1px solid var(--teal); border-radius:100px; padding:3px 9px; white-space:nowrap;\">&lt;5 min<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:14px; line-height:1.6; color:var(--ink-2); margin:0 0 12px;\">Guided lookup → preview → confirm. Disables the account, hides from GAL, moves OU, clears attributes, and runs the Exchange/O365 offboarding — legal-hold-aware (Plan 2 vs license removal), with live AD verification of every step.<\u002Fp>\n          <div style=\"font-family:var(--mono); font-size:11px; color:var(--ink-3); border-top:1px solid var(--rule); padding-top:10px;\">Every property · 1,500+ a year<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:24px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;\">\n            <h3 style=\"font-family:var(--display); font-weight:600; color:var(--ink); font-size:21px; margin:0;\">Server Creation<\u002Fh3>\n            <span style=\"font-family:var(--mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--teal); border:1px solid var(--teal); border-radius:100px; padding:3px 9px; white-space:nowrap;\">Casino-as-Code<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:14px; line-height:1.6; color:var(--ink-2); margin:0 0 12px;\">The front-end to the build pipeline: single-server form or multi-server CSV upload, live pre-flight VLAN resolution and disambiguation, then a dispatched build with a live progress stepper.<\u002Fp>\n          <div style=\"font-family:var(--mono); font-size:11px; color:var(--ink-3); border-top:1px solid var(--rule); padding-top:10px;\">SysOps team · 100s of builds a year<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:24px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;\">\n            <h3 style=\"font-family:var(--display); font-weight:600; color:var(--ink); font-size:21px; margin:0;\">Server Decommission<\u002Fh3>\n            <span style=\"font-family:var(--mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--teal); border:1px solid var(--teal); border-radius:100px; padding:3px 9px; white-space:nowrap;\">45→&lt;5 min<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:14px; line-height:1.6; color:var(--ink-2); margin:0 0 12px;\">Two-phase: a read-only pre-flight discovers the VM, AD object, DNS records and asset record; then confirmed, step-by-step execution with the operator verifying each step. Single or bulk, with a written receipt per server.<\u002Fp>\n          <div style=\"font-family:var(--mono); font-size:11px; color:var(--ink-3); border-top:1px solid var(--rule); padding-top:10px;\">SysOps team · several hundred a year<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:24px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;\">\n            <h3 style=\"font-family:var(--display); font-weight:600; color:var(--ink); font-size:21px; margin:0;\">AD Analyst Operations<\u002Fh3>\n            <span style=\"font-family:var(--mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--brass); border:1px solid var(--brass); border-radius:100px; padding:3px 9px; white-space:nowrap;\">Service Desk<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:14px; line-height:1.6; color:var(--ink-2); margin:0 0 12px;\">Self-service AD for analysts: user lookup, CSV bulk matching, and property-scoped directory pulls — plus group add/remove that's gated by an allow-list, so only approved groups can ever be touched. Every change is written to a JSON audit record.<\u002Fp>\n          <div style=\"font-family:var(--mono); font-size:11px; color:var(--ink-3); border-top:1px solid var(--rule); padding-top:10px;\">Hundreds of analysts across properties<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:24px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;\">\n            <h3 style=\"font-family:var(--display); font-weight:600; color:var(--ink); font-size:21px; margin:0;\">Temp / Exempt User Creation<\u002Fh3>\n            <span style=\"font-family:var(--mono); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--brass); border:1px solid var(--brass); border-radius:100px; padding:3px 9px; white-space:nowrap;\">LCM gap<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:14px; line-height:1.6; color:var(--ink-2); margin:0 0 12px;\">Closes the identity-lifecycle gap for temporary and exempt accounts — a consistent, repeatable creation path with the right attributes and placement, instead of ad-hoc manual provisioning.<\u002Fp>\n          <div style=\"font-family:var(--mono); font-size:11px; color:var(--ink-3); border-top:1px solid var(--rule); padding-top:10px;\">Used across every property<\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 03 SHARED PATTERN -->\n    <section style=\"margin-top:var(--sec-gap); max-width:760px;\">\n      <div style=\"font-family:var(--mono); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--brass); font-weight:600; margin-bottom:14px;\">03 — The shared safety pattern<\u002Fdiv>\n      <h2 style=\"font-family:var(--display); font-weight:600; letter-spacing:-0.015em; color:var(--ink); font-size:clamp(27px,3.5vw,37px); line-height:1.12; margin:0 0 20px;\">The same guardrails behind every button.<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.75; color:var(--ink-2); margin:0 0 26px; max-width:62ch;\">Speed is the headline; safety is the reason it's trusted enterprise-wide. Every app is built on the same disciplined pattern.<\u002Fp>\n    <\u002Fsection>\n\n    <div class=\"band\" style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px;\">\n      <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:20px;\">\n        <div style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:9px;\">Preview → confirm<\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.6; color:var(--ink-2); margin:0;\">A read-only preview of exactly what will happen, then an explicit confirmation, before anything destructive runs.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:20px;\">\n        <div style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:9px;\">Live verification<\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.6; color:var(--ink-2); margin:0;\">Jobs run asynchronously and report real results — the app confirms the change landed, not just that the job started.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:20px;\">\n        <div style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:9px;\">Gated &amp; ticketed<\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.6; color:var(--ink-2); margin:0;\">Allow-lists bound what's possible; change-ticket numbers are required before destructive actions are enabled.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:20px;\">\n        <div style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:9px;\">Secrets handled right<\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.6; color:var(--ink-2); margin:0;\">Operator credentials live only in-session and are handed to jobs through a short-lived, self-purging cache — never the job database.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:20px;\">\n        <div style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:9px;\">Audited end-to-end<\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.6; color:var(--ink-2); margin:0;\">Every action is logged with operator, ticket and timestamp — written receipts and audit records for compliance.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:var(--panel); border:1px solid var(--rule); border-radius:var(--radius); padding:20px;\">\n        <div style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:9px;\">Fails safe<\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.6; color:var(--ink-2); margin:0;\">A step in an unknown state raises an incident automatically; destructive actions refuse to run on the wrong state.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 04 IMPACT -->\n    <section style=\"margin-top:var(--sec-gap); max-width:760px;\">\n      <div style=\"font-family:var(--mono); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--brass); font-weight:600; margin-bottom:14px;\">04 — Impact<\u002Fdiv>\n      <h2 style=\"font-family:var(--display); font-weight:600; letter-spacing:-0.015em; color:var(--ink); font-size:clamp(27px,3.5vw,37px); line-height:1.12; margin:0 0 24px;\">Faster, safer, and the way it's done now.<\u002Fh2>\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <div style=\"display:flex; gap:16px; align-items:baseline; border-left:3px solid var(--teal); background:var(--panel); border-radius:0 5px 5px 0; padding:14px 18px;\">\n          <div style=\"font-family:var(--mono); font-size:14px; color:var(--teal); font-weight:600; white-space:nowrap;\">90 → &lt;5 min<\u002Fdiv>\n          <div style=\"font-size:14.5px; line-height:1.55; color:var(--ink-2);\">Terminations went from a 30-step, 60–90-minute manual process to a single button — adopted enterprise-wide across <b style=\"color:var(--ink);\">1,500+ terminations a year<\u002Fb>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:16px; align-items:baseline; border-left:3px solid var(--teal); background:var(--panel); border-radius:0 5px 5px 0; padding:14px 18px;\">\n          <div style=\"font-family:var(--mono); font-size:14px; color:var(--teal); font-weight:600; white-space:nowrap;\">45 → &lt;5 min<\u002Fdiv>\n          <div style=\"font-size:14.5px; line-height:1.55; color:var(--ink-2);\">Server decommissions dropped to a handful of clicks — with the operator verifying each step, keeping control tight while moving fast.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:16px; align-items:baseline; border-left:3px solid var(--brass); background:var(--panel); border-radius:0 5px 5px 0; padding:14px 18px;\">\n          <div style=\"font-family:var(--mono); font-size:14px; color:var(--brass); font-weight:600; white-space:nowrap;\">de facto<\u002Fdiv>\n          <div style=\"font-size:14.5px; line-height:1.55; color:var(--ink-2);\">Server creation and decommission are now the standard way the enterprise manages those processes — several hundred of each per year.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CLOSING -->\n    <section style=\"margin-top:var(--sec-gap); border-top:2px solid var(--brass); padding-top:40px; text-align:center;\">\n      <p style=\"font-family:var(--display); font-weight:600; letter-spacing:-0.01em; color:var(--ink); font-size:clamp(24px,3.6vw,36px); line-height:1.2; margin:0 auto; max-width:24ch;\">The whole team, operating like the most careful person on it.<\u002Fp>\n      <p style=\"font-size:16px; line-height:1.7; color:var(--ink-2); margin:22px auto 0; max-width:56ch;\">That's what these apps really deliver: not just speed, but consistency, safety and an audit trail — on the operations every property depends on.<\u002Fp>\n      <a href=\"index.html\" class=\"no-print\" style=\"display:inline-block; margin-top:26px; font-family:var(--mono); font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--teal); text-decoration:none; border:1px solid var(--teal); border-radius:100px; padding:9px 18px;\" style-hover=\"background:var(--teal-soft);\">↩ Back to the brief<\u002Fa>\n    <\u002Fsection>\n\n    <footer style=\"margin-top:56px; padding-top:20px; border-top:1px solid var(--rule); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; font-family:var(--mono); font-size:11px; color:var(--ink-3);\">\n      <span>Matt Clements — Purpose-Built Ops Apps<\u002Fspan>\n      <span>Deep dive<\u002Fspan>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;editorial&quot;,&quot;options&quot;:[&quot;editorial&quot;,&quot;noir&quot;,&quot;blueprint&quot;,&quot;swiss&quot;],&quot;tsType&quot;:&quot;\\&quot;editorial\\&quot;|\\&quot;noir\\&quot;|\\&quot;blueprint\\&quot;|\\&quot;swiss\\&quot;&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.barRef = React.createRef();\n    this.segRef = React.createRef();\n    this._onScroll = this._onScroll.bind(this);\n    let saved = null;\n    try { saved = localStorage.getItem('mc-portfolio-theme'); } catch (e) {}\n    this.state = { theme: saved || props.theme || 'editorial' };\n  }\n  componentDidMount() {\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    this._onScroll();\n    this._applyActive();\n  }\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onScroll);\n  }\n  componentDidUpdate() {\n    this._applyActive();\n  }\n  _applyActive() {\n    const root = this.segRef && this.segRef.current;\n    if (!root) return;\n    const cur = this.state.theme;\n    Array.prototype.forEach.call(root.children, (btn) => {\n      const on = btn.getAttribute('data-theme') === cur;\n      btn.style.border = '1px solid ' + (on ? 'var(--brass)' : 'transparent');\n      btn.style.background = on ? 'var(--brass-soft)' : 'transparent';\n      btn.style.color = on ? 'var(--brass)' : 'var(--ink-3)';\n    });\n  }\n  _onScroll() {\n    const el = document.scrollingElement || document.documentElement;\n    const max = el.scrollHeight - el.clientHeight;\n    const p = max > 0 ? (el.scrollTop / max) * 100 : 0;\n    if (this.barRef.current) this.barRef.current.style.width = p + '%';\n  }\n  setTheme(t) {\n    try { localStorage.setItem('mc-portfolio-theme', t); } catch (e) {}\n    this.setState({ theme: t });\n  }\n  renderVals() {\n    const THEMES = {\n      editorial: { bg:'#FAF8F2', img:'radial-gradient(900px 420px at 10% -6%, rgba(15,117,107,0.05), transparent 60%), radial-gradient(760px 380px at 100% 0%, rgba(140,110,51,0.055), transparent 55%)', size:'100% 100%', vars:{ '--paper':'#FAF8F2','--paper-2':'#F3EFE6','--panel':'#FFFFFF','--panel-2':'#FBF8F1','--ink':'#1B1A17','--ink-2':'#544F47','--ink-3':'#8B8377','--rule':'#E6DFD0','--rule-strong':'#D6CBB4','--teal':'#0F756B','--teal-soft':'#E4F0EE','--brass':'#8C6E33','--brass-soft':'#F2E9D6','--display':\"'Spectral', Georgia, serif\",'--radius':'6px' } },\n      noir: { bg:'#0d1117', img:'radial-gradient(1100px 480px at 12% -8%, rgba(95,202,189,0.10), transparent 60%), radial-gradient(900px 420px at 100% 0%, rgba(200,168,106,0.06), transparent 55%), linear-gradient(#0f1620 1px, transparent 1px), linear-gradient(90deg, #0f1620 1px, transparent 1px)', size:'100% 100%, 100% 100%, 46px 46px, 46px 46px', vars:{ '--paper':'#0d1117','--paper-2':'#131a23','--panel':'#161e28','--panel-2':'#1b2531','--ink':'#e6ebf2','--ink-2':'#9aa6b4','--ink-3':'#64707e','--rule':'#26303d','--rule-strong':'#36424f','--teal':'#5fcabd','--teal-soft':'rgba(95,202,189,0.13)','--brass':'#c8a86a','--brass-soft':'rgba(200,168,106,0.14)','--display':\"'Spectral', Georgia, serif\",'--radius':'8px' } },\n      blueprint: { bg:'#EDF1F3', img:'linear-gradient(rgba(14,22,32,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(14,22,32,0.045) 1px, transparent 1px), radial-gradient(900px 420px at 100% -6%, rgba(12,111,101,0.06), transparent 60%)', size:'34px 34px, 34px 34px, 100% 100%', vars:{ '--paper':'#EDF1F3','--paper-2':'#E2E8EC','--panel':'#FAFCFD','--panel-2':'#F0F4F6','--ink':'#0E1620','--ink-2':'#45515D','--ink-3':'#7C8893','--rule':'#D3DBE1','--rule-strong':'#BCC7CF','--teal':'#0C6F65','--teal-soft':'#DBECEA','--brass':'#7E6428','--brass-soft':'#ECE5D4','--display':\"'IBM Plex Mono', ui-monospace, monospace\",'--radius':'3px' } },\n      swiss: { bg:'#FFFFFF', img:'none', size:'auto', vars:{ '--paper':'#FFFFFF','--paper-2':'#F4F5F6','--panel':'#FFFFFF','--panel-2':'#FAFAFB','--ink':'#111315','--ink-2':'#4B5158','--ink-3':'#878E96','--rule':'#E7E9EC','--rule-strong':'#D3D7DC','--teal':'#0E7C71','--teal-soft':'#E2F1EE','--brass':'#2A2E33','--brass-soft':'#EEF0F2','--display':\"'IBM Plex Sans', system-ui, sans-serif\",'--radius':'4px' } }\n    };\n    const active = THEMES[this.state.theme] ? this.state.theme : 'editorial';\n    const t = THEMES[active];\n    const themeStyle = Object.assign({ minHeight:'100vh', backgroundColor:t.bg, backgroundImage:t.img, backgroundSize:t.size, backgroundAttachment:'fixed' }, t.vars);\n    return {\n      barRef: this.barRef,\n      segRef: this.segRef,\n      themeStyle,\n      setEditorial: () => this.setTheme('editorial'),\n      setNoir: () => this.setTheme('noir'),\n      setBlueprint: () => this.setTheme('blueprint'),\n      setSwiss: () => this.setTheme('swiss'),\n      print: () => window.print(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
